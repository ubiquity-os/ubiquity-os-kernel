name: Deno Deploy

on:
  workflow_dispatch:
  push:
  delete:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    timeout-minutes: 20
    environment: ${{ (github.event.ref == 'refs/heads/main' || github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main') && 'main' || 'development' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Set ACTION_REF environment variable
        run: |
          branch_name=$(echo '${{ github.event.ref || github.event.workflow_run.head_branch || github.ref }}' | sed 's#refs/heads/##')
          echo "ACTION_REF=${GITHUB_REPOSITORY}@${branch_name}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Compute Deno Deploy project name
        id: deno
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"

          project="$repo"
          if [ "$owner" != "ubiquity-os" ]; then
            project="${repo}-${owner}"
          fi

          # Deno Deploy project names are lowercase and typically limited to [a-z0-9-].
          project="$(printf "%s" "$project" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          project="${project#-}"
          project="${project%-}"

          echo "project_name=$project" >> "$GITHUB_OUTPUT"
          echo "Computed project_name=$project"
      
      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DENO_DEPLOY_TOKEN }}" ]; then echo "Missing required secret: DENO_DEPLOY_TOKEN" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_WEBHOOK_SECRET }}" ]; then echo "Missing required secret: APP_WEBHOOK_SECRET" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_ID }}" ]; then echo "Missing required secret: APP_ID" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then echo "Missing required secret: APP_PRIVATE_KEY" >&2; exit 1; fi

      - uses: ubiquity-os/deno-plugin-adapter@main
        id: adapter
        with:
          pluginEntry: "./adapters/server"

      - uses: ubiquity-os/deno-deploy@main
        env:
          APP_WEBHOOK_SECRET: ${{ secrets.APP_WEBHOOK_SECRET }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT || 'development' }}
          UBQ_AGENT_OWNER: ${{ secrets.UBQ_AGENT_OWNER || github.repository_owner }}
          UBQ_AGENT_REPO: ${{ secrets.UBQ_AGENT_REPO || github.event.repository.name }}
          UBQ_AGENT_WORKFLOW: ${{ secrets.UBQ_AGENT_WORKFLOW || 'agent.yml' }}
          UBQ_AGENT_REF: ${{ secrets.UBQ_AGENT_REF || '' }}
          UBQ_AI_BASE_URL: ${{ secrets.UBQ_AI_BASE_URL || 'https://ai.ubq.fi' }}
          UBQ_AI_FALLBACK_BASE_URL: ${{ secrets.UBQ_AI_FALLBACK_BASE_URL || 'https://ai-ubq-fi.deno.dev' }}
          NODE_ENV: "production"
        with:
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          action: ${{ github.event_name == 'delete' && 'delete' || 'deploy' }}
          organization: ${{ secrets.DENO_ORG_NAME }}
          entrypoint: ${{ steps.adapter.outputs.entrypoint }}
          project_name: ${{ secrets.DENO_PROJECT_NAME || steps.deno.outputs.project_name }}

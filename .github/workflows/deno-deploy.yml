name: Deno Deploy

on:
  workflow_dispatch:
  push:
  delete:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    timeout-minutes: 20
    environment: ${{ (github.event.ref == 'refs/heads/main' || github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main') && 'main' || 'development' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Set ACTION_REF environment variable
        run: |
          branch_name=$(echo '${{ github.event.ref || github.event.workflow_run.head_branch || github.ref }}' | sed 's#refs/heads/##')
          echo "ACTION_REF=${GITHUB_REPOSITORY}@${branch_name}" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        # Submodules are not required for deploy; the kernel consumes the npm-published SDK.

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DENO_DEPLOY_TOKEN }}" ]; then echo "Missing required secret: DENO_DEPLOY_TOKEN" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_WEBHOOK_SECRET }}" ]; then echo "Missing required secret: APP_WEBHOOK_SECRET" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_ID }}" ]; then echo "Missing required secret: APP_ID" >&2; exit 1; fi
          if [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then echo "Missing required secret: APP_PRIVATE_KEY" >&2; exit 1; fi

      - uses: ubiquity-os/deno-deploy@main
        env:
          APP_WEBHOOK_SECRET: ${{ secrets.APP_WEBHOOK_SECRET }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT || 'development' }}
          UOS_AGENT_OWNER: ${{ secrets.UOS_AGENT_OWNER || github.repository_owner }}
          UOS_AGENT_REPO: ${{ secrets.UOS_AGENT_REPO || github.event.repository.name }}
          UOS_AGENT_WORKFLOW: ${{ secrets.UOS_AGENT_WORKFLOW || 'agent.yml' }}
          UOS_AGENT_REF: ${{ secrets.UOS_AGENT_REF || '' }}
          UOS_AGENT_MEMORY_URL: ${{ secrets.UOS_AGENT_MEMORY_URL || '' }}
          UOS_AGENT_MEMORY_KEY: ${{ secrets.UOS_AGENT_MEMORY_KEY || '' }}
          UOS_DIAGNOSTICS_TOKEN: ${{ secrets.UOS_DIAGNOSTICS_TOKEN || '' }}
          UOS_KERNEL_BASE_URL: ${{ secrets.UOS_KERNEL_BASE_URL || '' }}
          UOS_KERNEL_TRUSTED_HOSTS: ${{ secrets.UOS_KERNEL_TRUSTED_HOSTS || '' }}
          UOS_AI_BASE_URL: ${{ secrets.UOS_AI_BASE_URL || 'https://ai.ubq.fi' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}
          # SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          # SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || '' }}
          NODE_ENV: "production"
          GIT_REVISION: ${{ github.sha }}
        with:
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          action: ${{ github.event_name == 'delete' && 'delete' || 'provision' }}
          entrypoint: src/kernel.ts
          buildManifest: false

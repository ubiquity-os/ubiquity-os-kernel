name: Deno Deploy

on:
  workflow_dispatch:
  push:
  delete:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    timeout-minutes: 20
    environment: ${{ (github.event.ref == 'refs/heads/main' || github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main') && 'main' || 'development' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Set ACTION_REF environment variable
        run: |
          branch_name=$(echo '${{ github.event.ref || github.event.workflow_run.head_branch || github.ref }}' | sed 's#refs/heads/##')
          echo "ACTION_REF=${GITHUB_REPOSITORY}@${branch_name}" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        # Submodules are not required for deploy; the kernel consumes the npm-published SDK.

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DENO_DEPLOY_TOKEN }}" ]; then echo "Missing required secret: DENO_DEPLOY_TOKEN" >&2; exit 1; fi
          if [ -z "${{ secrets.UOS_GITHUB }}" ]; then echo "Missing required secret: UOS_GITHUB" >&2; exit 1; fi

      - uses: ubiquity-os/deno-deploy@main
        env:
          UOS_GITHUB: ${{ secrets.UOS_GITHUB }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT || 'development' }}
          UOS_KERNEL_BASE_URL: ${{ secrets.UOS_KERNEL_BASE_URL || '' }}
          UOS_KERNEL_TRUSTED_HOSTS: ${{ secrets.UOS_KERNEL_TRUSTED_HOSTS || '' }}
          UOS_AGENT: ${{ secrets.UOS_AGENT || '' }}
          UOS_AI: ${{ secrets.UOS_AI || '' }}
          UOS_AGENT_MEMORY: ${{ secrets.UOS_AGENT_MEMORY || '' }}
          UOS_DIAGNOSTICS: ${{ secrets.UOS_DIAGNOSTICS || '' }}
          UOS_SUPABASE: ${{ secrets.UOS_SUPABASE || '' }}
          UOS_KERNEL: ${{ secrets.UOS_KERNEL || '' }}
          UOS_TELEGRAM: ${{ secrets.UOS_TELEGRAM || '' }}
          UOS_GOOGLE_DRIVE: ${{ secrets.UOS_GOOGLE_DRIVE || '' }}
          UOS_X: ${{ secrets.UOS_X || '' }}
          NODE_ENV: "production"
          GIT_REVISION: ${{ github.sha }}
        with:
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
          action: ${{ github.event_name == 'delete' && 'delete' || 'deploy' }}
          organization: ${{ secrets.DENO_ORG_NAME }}
          entrypoint: src/kernel.ts
          project_name: ${{ secrets.DENO_PROJECT_NAME }}

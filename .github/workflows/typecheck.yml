name: Type Check

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run typecheck
        run: deno task check

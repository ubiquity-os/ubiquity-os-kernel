name: Format Checks

on:
  push:

jobs:
  formatCheck:
    name: Check for formatting issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run prettier
        run: deno task fmt:check

      - name: Run eslint
        run: deno task lint
